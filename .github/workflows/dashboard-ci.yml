name: Dashboard CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dashboard/app/backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r dashboard/app/backend/requirements.txt
      - name: Run backend tests
        working-directory: dashboard/app/backend
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend contracts and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/app/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: dashboard/app/frontend
        run: npm ci
      - name: Run contract tests
        working-directory: dashboard/app/frontend
        run: npm run test:contracts
      - name: Build frontend
        working-directory: dashboard/app/frontend
        run: npm run build

  reports:
    name: Report validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate canonical reports
        run: python experiments/verify_reports.py

  docker:
    name: Docker build checks
    runs-on: ubuntu-latest
    needs: [backend, frontend, reports]
    steps:
      - uses: actions/checkout@v4
      - name: Build Render dashboard image
        run: docker build -f dashboard/render.Dockerfile -t maine-lakes-secchi-dashboard:ci .
      - name: Build backend image
        run: docker build -f dashboard/backend.Dockerfile -t maine-lakes-secchi-backend:ci .
      - name: Build frontend image
        run: docker build -f dashboard/frontend.Dockerfile -t maine-lakes-secchi-frontend:ci .
