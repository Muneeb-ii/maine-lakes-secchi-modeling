name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r dashboard/app/backend/requirements.txt

      - name: Run backend tests
        working-directory: dashboard/app/backend
        run: python -m unittest discover -s tests

      - name: Validate experiment outputs
        run: python experiments/run.py validate

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: dashboard/app/frontend
        run: npm ci

      - name: Run frontend contract tests
        working-directory: dashboard/app/frontend
        run: npm run test:contracts

      - name: Build frontend
        working-directory: dashboard/app/frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f dashboard/backend.Dockerfile .

      - name: Build frontend image
        run: docker build -f dashboard/frontend.Dockerfile --build-arg VITE_API_URL=http://localhost:8000 .
