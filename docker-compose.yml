services:
  backend:
    build:
      context: .
      dockerfile: dashboard/backend.Dockerfile
    environment:
      MODEL_ARTIFACTS_PATH: /app/artifacts/models
      API_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: dashboard/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
